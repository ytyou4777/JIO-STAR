name: Update JioStar Playlist

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependency
        run: pip install requests

      - name: Update playlist
        run: |
          python <<EOF
          import requests,re,os,sys

          m3u_file="jiostar.m3u"

          jio_source="https://raw.githubusercontent.com/pk3011/pkjtv/refs/heads/main/jtv.m3u"
          hotstar_source="https://voot.vodep39240327.workers.dev?voot.m3u"

          # FETCH JIO SOURCE
          jio_res=requests.get(jio_source,timeout=20)
          jio_lines=jio_res.text.splitlines()

          jio_map={}
          last=None

          for l in jio_lines:

              if l.startswith("#EXTINF"):
                  last=l

              elif l.startswith("http") and last:
                  name=re.search(r',(.+)',last)
                  if name:
                      jio_map[name.group(1).strip()]=l
                  last=None

          # GET TOKENS
          jio_token=None
          jio_match=re.search(r'__hdnea__=[^&]+',jio_res.text)
          if jio_match:
              jio_token=jio_match.group(0)

          hs_res=requests.get(hotstar_source,timeout=20)

          hs_token=None
          hs_match=re.search(r'hdntl=exp=[^&"]+',hs_res.text)
          if hs_match:
              hs_token=hs_match.group(0)

          if not os.path.exists(m3u_file):
              print("Playlist missing")
              sys.exit(1)

          with open(m3u_file,"r",encoding="utf-8") as f:
              lines=f.readlines()

          updated=[]
          current=None

          for line in lines:

              s=line.strip()

              if s.startswith("#EXTINF"):
                  updated.append(line)
                  name=re.search(r',(.+)',s)
                  current=name.group(1).strip() if name else None
                  continue

              # REPLACE JIO LINK
              if s.startswith("http") and current in jio_map:

                  new=jio_map[current]

                  if jio_token:

                      if "__hdnea__" in new:
                          new=re.sub(r'__hdnea__=[^&]+',jio_token,new)

                      else:
                          if "?" in new:
                              new+="&"+jio_token
                          else:
                              new+="?"+jio_token

                  updated.append(new+"\n")
                  continue

              # HOTSTAR TOKEN UPDATE
              if "hotstar.com" in s and hs_token:
                  s=re.sub(r'hdntl=exp=[^&]+',hs_token,s)
                  updated.append(s+"\n")
                  continue

              updated.append(line)

          with open(m3u_file,"w",encoding="utf-8") as f:
              f.writelines(updated)

          print("Playlist updated")
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add jiostar.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto Update: Jio & Hotstar tokens + links"
          git push
